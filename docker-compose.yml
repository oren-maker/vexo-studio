version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vexo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vexo
      POSTGRES_PASSWORD: vexo
      POSTGRES_DB: vexo_studio
    ports:
      - "55432:5432"
    volumes:
      - vexo_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vexo -d vexo_studio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vexo-redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    volumes:
      - vexo_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vexo-api
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: vexo-web
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: vexo-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  vexo_postgres:
  vexo_redis:
